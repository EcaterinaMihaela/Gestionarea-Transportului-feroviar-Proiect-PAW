<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <title>Lista comenzilor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="Css/style.css">
    <link rel="stylesheet" href="Css/lista-comenzi.css">
</head>

<body>

    <!--nav bar-->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Trafic Feroviar</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="trenuri.html">Trenuri</a></li>
                    <li class="nav-item"><a class="nav-link" href="rute-trenuri.html">Rute+Cumpară</a></li>
                    <li class="nav-item"><a class="nav-link" href="statii.html">Stații</a></li>
                    <li class="nav-item"><a class="nav-link" href="comenzi.html">Comenzi</a></li>
                    <li class="nav-item"><a class="nav-link" href="suport.html">Suport</a></li>
                </ul>

                <span class="navbar-text" id="userSection">

                    <span id="userName"></span>
                    <span id="userEmail"></span>

                    <a id="profilBtn" href="contul-meu.html" class="btn btn-profile btn-sm ms-2">Profil</a>

                    <button id="logoutBtn" class="btn btn-danger btn-sm ms-2">Logout</button>
                    <button id="darkModeToggle" class="btn btn-darkmode btn-sm ms-2">
                        🌙 Dark
                    </button>

                </span>
            </div>
        </div>
    </nav>

    <div class="hero-section shadow-sm mb-5">
            <div class="container text-center">
                <div class="hero-content py-5">
                    <h1 class="display-5 fw-bold text-white">Lista comenzilor</h1>
                    <p class="lead text-white">Vezi toate comenzile tale și gestionează biletele sau abonamentele rapid.
                    </p>
                </div>
            </div>
        </div>
    <div class="container mt-5">

        <div class="row mb-4">

            <div class="col-md-3">
                <label>De la:</label>
                <input type="date" id="dataStart" class="form-control">
            </div>

            <div class="col-md-3">
                <label>Până la:</label>
                <input type="date" id="dataEnd" class="form-control">
            </div>

            <div class="col-md-2 d-flex align-items-end">
                <button class="btn btn-dark" onclick="filtreaza()">Caută</button>
            </div>

        </div>


        <table class="table table-bordered">

            <thead>
                <tr>
                    <th>ID bilet/abonament</th>
                    <th>Cumpărat în</th>
                    <th>Călătorie în</th>
                    <th>De la</th>
                    <th>Până la</th>
                    <th>Sterge/detalii</th>
                </tr>
            </thead>

            <tbody id="tabelComenzi">
            </tbody>

        </table>

    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
    <script src="js/lista-comenzi.js"></script>
</body>

</html>
