<!DOCTYPE html>
<html lang="ro">

<head>
  <meta charset="UTF-8">
  <title>Trafic Feroviar - Acasă</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="Css/style.css">
  <link rel="stylesheet" href="Css/index.css">
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">Trafic Feroviar</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="tren.html">Tren</a></li>
          <li class="nav-item"><a class="nav-link" href="rute-trenuri.html">Rute Trenuri</a></li>
          <li class="nav-item"><a class="nav-link" href="statie.html">Stație</a></li>
          <li class="nav-item"><a class="nav-link active" href="comenzi.html">Comenzi</a></li>
          <li class="nav-item"><a class="nav-link" href="suport.html">Suport</a></li>
        </ul>

        <span class="navbar-text" id="userSection">

          <span id="userName"></span>
          <span id="userEmail"></span>

          <a id="profilBtn" href="contul-meu.html" class="btn btn-profile btn-sm ms-2">Profil</a>

          <button id="darkModeToggle" class="btn btn-darkmode btn-sm ms-2">
            🌙 Dark
          </button>

        </span>
      </div>
    </div>
  </nav>

  <!-- Conținut principal -->
  <div class="hero-section">
    <div class="search-card">
      <h2 class="mb-4 text-center">Caută trenul tău</h2>

      <form id="searchForm">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Stație plecare</label>
            <input type="text" class="form-control" id="plecare" placeholder="Ex: București Nord">
          </div>

          <div class="col-md-6">
            <label class="form-label">Stație sosire</label>
            <input type="text" class="form-control" id="sosire" placeholder="Ex: Brașov">
          </div>

          <div class="col-md-6">
            <label class="form-label">Data plecare</label>
            <input type="date" class="form-control" id="data">
          </div>

          <div class="col-md-6 d-flex align-items-end">
            <button type="submit" class="btn w-100 search-btn">
              Caută trenuri
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/index.js"></script>
  <script src="js/script.js"></script>
</body>

</html>
