<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f5f5;
        }

        .register-box {
            max-width: 500px;
            margin: auto;
            margin-top: 80px;
        }
    </style>

</head>

<body>

    <!--nav bar-->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Trafic Feroviar</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="tren.html">Tren</a></li>
                    <li class="nav-item"><a class="nav-link" href="rute-trenuri.html">Rute Trenuri</a></li>
                    <li class="nav-item"><a class="nav-link" href="statie.html">Stație</a></li>
                    <li class="nav-item"><a class="nav-link active" href="comenzi.html">Comenzi</a></li>
                    <li class="nav-item"><a class="nav-link" href="suport.html">Suport</a></li>
                </ul>

                <span class="navbar-text">
                    Nume Utilizator | email@test.com
                    <a href="contul-meu.html" class="btn btn-sm btn-light ms-2">Profil</a>
                </span>
            </div>
        </div>
    </nav>

    <div class="container">

        <div class="card register-box shadow p-4">

            <h3 class="text-center mb-4">Creare cont</h3>

            <form>

                <div class="mb-3">
                    <label class="form-label">Nume</label>
                    <input type="text" class="form-control" placeholder="Numele tău">
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" placeholder="Introdu email">
                </div>

                <div class="mb-3">
                    <label class="form-label">Parolă</label>
                    <input type="password" class="form-control" placeholder="Introdu parola">
                </div>

                <div class="mb-3">
                    <label class="form-label">Confirmă parola</label>
                    <input type="password" class="form-control" placeholder="Confirmă parola">
                </div>

                <button class="btn btn-dark w-100 mb-3">
                    Creează cont
                </button>

                <p class="text-center">
                    Ai deja cont?
                    <a href="login.html">Autentifică-te</a>
                </p>

            </form>

        </div>

    </div>

</body>

</html>
