<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="Css/register.css">
    <link rel="stylesheet" href="Css/style.css">

</head>

<body>

    <!--nav bar-->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Trafic Feroviar</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="trenuri.html">Trenuri</a></li>
                    <li class="nav-item"><a class="nav-link" href="rute-trenuri.html">Rute+Cumpară</a></li>
                    <li class="nav-item"><a class="nav-link" href="statii.html">Stații</a></li>
                    <li class="nav-item"><a class="nav-link" href="comenzi.html">Comenzi</a></li>
                    <li class="nav-item"><a class="nav-link" href="suport.html">Suport</a></li>
                </ul>

                <span class="navbar-text" id="userSection">

                    <span id="userName"></span>
                    <span id="userEmail"></span>

                    <a id="profilBtn" href="contul-meu.html" class="btn btn-profile btn-sm ms-2">Profil</a>

                    <button id="logoutBtn" class="btn btn-danger btn-sm ms-2">Logout</button>
                    <button id="darkModeToggle" class="btn btn-darkmode btn-sm ms-2">
                        🌙 Dark
                    </button>

                </span>
            </div>
        </div>
    </nav>

    <div class="container">

        <div class="card register-box shadow p-4">

            <h3 class="text-center mb-4">Creare cont</h3>

            <form id="registerForm">

                <div class="mb-3">
                    <label class="form-label">Nume</label>
                    <input type="text" id="nume" class="form-control" placeholder="Numele tău">
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="Introdu email">
                </div>

                <div class="mb-3">
                    <label class="form-label">Parolă</label>
                    <input type="password" class="form-control" placeholder="Introdu parola">
                </div>

                <div class="mb-3">
                    <label class="form-label">Confirmă parola</label>
                    <input type="password" class="form-control" placeholder="Confirmă parola">
                </div>

                <button class="btn btn-dark w-100 mb-3">
                    Creează cont
                </button>

                <p class="text-center">
                    Ai deja cont?
                    <a href="login.html">Autentifică-te</a>
                </p>

            </form>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
